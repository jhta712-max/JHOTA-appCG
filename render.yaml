services:
  # ============================================================
  # BACKEND (Node.js + Express)
  # ============================================================
  - type: web
    name: jhota-backend
    plan: standard
    region: ohio
    runtime: docker

    dockerfilePath: Dockerfile.backend

    # Migraciones en pre-deploy: resuelve baseline fallida primero, luego deploy
    preDeployCommand: "P=$(find /app/node_modules/.pnpm -type f -name 'index.js' -path '*/prisma/build/index.js' 2>/dev/null | head -1); node \"$P\" migrate resolve --rolled-back 20260531000000_init_baseline --schema /app/apps/backend/prisma/schema.prisma 2>/dev/null; node \"$P\" migrate resolve --applied 20260531000000_init_baseline --schema /app/apps/backend/prisma/schema.prisma 2>/dev/null; node \"$P\" migrate deploy --schema /app/apps/backend/prisma/schema.prisma"

    envVars:
      - key: NODE_ENV
        value: production

      - key: DATABASE_URL
        fromDatabase:
          name: jhota-postgres
          property: connectionString

      - key: JWT_SECRET
        sync: false

      - key: JWT_REFRESH_SECRET
        sync: false

      - key: JWT_ACCESS_EXPIRES
        value: 15m

      - key: JWT_REFRESH_EXPIRES
        value: 7d

      - key: FRONTEND_URL
        value: https://jhota-frontend.onrender.com

      - key: CORS_ORIGIN
        value: https://jhota-frontend.onrender.com

      - key: STORAGE_TYPE
        value: local

      - key: LOG_LEVEL
        value: info

      - key: ANTHROPIC_API_KEY
        sync: false


    autoDeploy: true

    healthCheckPath: /health

    depends:
      - jhota-postgres

  # ============================================================
  # FRONTEND (React + Vite + Nginx)
  # ============================================================
  - type: web
    name: jhota-frontend
    plan: standard
    region: ohio
    runtime: docker

    dockerfilePath: Dockerfile.frontend

    buildCommand: null
    startCommand: null

    envVars:
      - key: VITE_API_URL
        value: https://jhota-backend.onrender.com/api/v1

    autoDeploy: true

    headers:
      - path: /
        name: Cache-Control
        value: public, max-age=3600
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable

databases:
  - name: jhota-postgres
    plan: standard
    region: ohio
    version: "16"
    databaseName: jhota_gastos
    databaseUser: jhota_user
    ipAllowList: []
