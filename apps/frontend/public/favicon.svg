<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Navy background -->
  <rect width="512" height="512" fill="#0D1B48"/>

  <!-- J letter — white on navy, matching the uploaded JHOTA logo proportions -->
  <!-- Top-right serif cap of J -->
  <rect x="164" y="80" width="184" height="52" fill="white"/>
  <!-- Small left extension at top -->
  <rect x="164" y="80" width="52" height="20" fill="white"/>
  <!-- Vertical stem -->
  <rect x="296" y="80" width="52" height="290" fill="white"/>
  <!-- Bottom left foot of J -->
  <rect x="112" y="360" width="236" height="52" fill="white"/>
  <!-- Connecting curve approximation (bottom-right of stem to left foot) -->
  <!-- Bottom line accent -->
  <rect x="80" y="444" width="352" height="18" fill="white" opacity="0.5"/>
</svg>
