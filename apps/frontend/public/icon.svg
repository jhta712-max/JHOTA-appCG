<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!--
      Clip to the octagon (beveled rectangle) that forms the hexagonal
      ServingMI isotipo. All four corners are beveled at 45°.
    -->
    <clipPath id="hex">
      <polygon points="146,76 366,76 406,116 406,396 366,436 146,436 106,396 106,116"/>
    </clipPath>
  </defs>

  <!-- White icon background (iOS rounds corners automatically) -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Solid yellow octagon — the full body of the mark -->
  <polygon
    points="146,76 366,76 406,116 406,396 366,436 146,436 106,396 106,116"
    fill="#F5C218"/>

  <!--
    Two white diagonal parallelograms cut through the octagon at ~22°,
    creating three yellow bands (top, middle, bottom) — the S-shape.
    Each parallelogram extends well beyond the octagon; clipPath trims them.
    Slope: Δy/Δx = 0.407 (≈ 22° from horizontal, upper-left → lower-right).
  -->

  <!-- White cut 1  (upper white band) -->
  <polygon
    points="-100,39  612,329  612,376  -100,86"
    fill="#ffffff"
    clip-path="url(#hex)"/>

  <!-- White cut 2  (lower white band) -->
  <polygon
    points="-100,140  612,430  612,477  -100,187"
    fill="#ffffff"
    clip-path="url(#hex)"/>
</svg>
