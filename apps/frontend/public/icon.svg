<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!--
      Octagon (tall + narrow, 216 × 360 px, centered in 512×512).
      All four corners beveled 40 px at 45°.
    -->
    <clipPath id="hex">
      <polygon points="188,76 324,76 364,116 364,396 324,436 188,436 148,396 148,116"/>
    </clipPath>
  </defs>

  <!-- White icon background -->
  <rect width="512" height="512" fill="#ffffff"/>

  <!-- Solid yellow octagon -->
  <polygon
    points="188,76 324,76 364,116 364,396 324,436 188,436 148,396 148,116"
    fill="#F5C218"/>

  <!--
    Two white diagonal bands, direction "/" (lower-left → upper-right).
    They cut the octagon into three yellow sections:
      · large top-left band  (≈ 108 px at centre)
      · thin middle band     (≈  36 px at centre)
      · large bottom-right band (≈ 108 px at centre)
    Slope ≈ −0.367 (≈ 20° from horizontal), identical for both cuts.
    Polygons extend well beyond the octagon; clipPath trims them clean.
  -->

  <!-- White cut 1 (upper) -->
  <polygon
    points="0,278  512,90  512,144  0,332"
    fill="#ffffff"
    clip-path="url(#hex)"/>

  <!-- White cut 2 (lower) -->
  <polygon
    points="0,368  512,180  512,234  0,422"
    fill="#ffffff"
    clip-path="url(#hex)"/>
</svg>
