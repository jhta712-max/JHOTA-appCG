server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Manejo de rutas React Router (SPA)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA manifest e iconos — sin cache para que iOS/Android siempre descargue la versión actual
    location ~* ^/(manifest\.json|icon.*\.png|apple-touch-icon.*\.png|favicon\.svg|favicon\.ico)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # Cache largo solo para assets hasheados por Vite (bundle JS/CSS/fonts)
    location ~* ^/assets/.*\.(js|css|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Cache moderado para otras imágenes estáticas
    location ~* \.(jpg|jpeg|gif|svg|png)$ {
        expires 1d;
        add_header Cache-Control "public, must-revalidate";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
