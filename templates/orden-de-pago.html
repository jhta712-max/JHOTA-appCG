<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Orden de Pago — Control de Gastos</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:        #F59E0B;
      --primary-hover:  #D97706;
      --primary-light:  #FEF3C7;
      --primary-text:   #92400E;
      --bg:             #F9FAFB;
      --white:          #FFFFFF;
      --gray-50:        #F9FAFB;
      --gray-100:       #F3F4F6;
      --gray-200:       #E5E7EB;
      --gray-300:       #D1D5DB;
      --gray-400:       #9CA3AF;
      --gray-500:       #6B7280;
      --gray-600:       #4B5563;
      --gray-700:       #374151;
      --gray-800:       #1F2937;
      --gray-900:       #111827;
      --green-100:      #D1FAE5;
      --green-700:      #047857;
      --red-100:        #FEE2E2;
      --red-500:        #EF4444;
      --red-700:        #B91C1C;
      --blue-100:       #DBEAFE;
      --blue-700:       #1D4ED8;
      --radius:         12px;
      --radius-sm:      8px;
      --shadow:         0 1px 3px rgba(0,0,0,.1), 0 1px 2px rgba(0,0,0,.06);
      --shadow-md:      0 4px 6px -1px rgba(0,0,0,.1), 0 2px 4px -1px rgba(0,0,0,.06);
      --shadow-lg:      0 10px 15px -3px rgba(0,0,0,.1), 0 4px 6px -2px rgba(0,0,0,.05);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--gray-900);
      min-height: 100vh;
    }

    /* ── Top bar ─────────────────────────────────────────────── */
    .topbar {
      background: var(--gray-900);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: var(--shadow-md);
    }
    .topbar-icon {
      width: 32px; height: 32px;
      background: var(--primary);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .topbar-title { font-size: 15px; font-weight: 700; }
    .topbar-sub   { font-size: 11px; color: var(--gray-400); margin-top: 1px; }
    .topbar-tabs  { margin-left: auto; display: flex; gap: 4px; }
    .tab-btn {
      padding: 7px 16px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: all .15s;
      color: var(--gray-300);
      background: transparent;
    }
    .tab-btn:hover    { background: rgba(255,255,255,.1); color: white; }
    .tab-btn.active   { background: var(--primary); color: var(--gray-900); }

    /* ── Layout ──────────────────────────────────────────────── */
    .container { max-width: 820px; margin: 0 auto; padding: 28px 20px; }

    /* ── Cards ───────────────────────────────────────────────── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      border: 1px solid var(--gray-200);
      box-shadow: var(--shadow);
      padding: 24px;
      margin-bottom: 20px;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gray-900);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .section-num {
      width: 24px; height: 24px;
      background: var(--primary-light);
      color: var(--primary-text);
      border-radius: 50%;
      font-size: 11px;
      font-weight: 800;
      display: flex; align-items: center; justify-content: center;
    }

    /* ── Form elements ───────────────────────────────────────── */
    .form-group { margin-bottom: 16px; }
    .form-row   { display: grid; gap: 14px; margin-bottom: 16px; }
    .form-row.cols-2 { grid-template-columns: 1fr 1fr; }
    .form-row.cols-3 { grid-template-columns: 1fr 1fr 1fr; }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 5px;
    }
    .optional { font-weight: 400; color: var(--gray-400); font-size: 11px; }

    input, select, textarea {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--gray-300);
      border-radius: var(--radius-sm);
      font-size: 14px;
      color: var(--gray-900);
      background: var(--white);
      outline: none;
      transition: border-color .15s, box-shadow .15s;
      font-family: inherit;
    }
    input:focus, select:focus, textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(245,158,11,.15);
    }
    input::placeholder, textarea::placeholder { color: var(--gray-400); }
    textarea { resize: vertical; min-height: 72px; }
    input[readonly] {
      background: var(--gray-50);
      color: var(--gray-600);
      border-color: var(--gray-200);
    }

    /* ── Buttons ─────────────────────────────────────────────── */
    .btn {
      padding: 9px 18px;
      border-radius: var(--radius-sm);
      border: none;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all .15s;
    }
    .btn-primary {
      background: var(--primary);
      color: var(--gray-900);
    }
    .btn-primary:hover   { background: var(--primary-hover); }
    .btn-secondary {
      background: var(--white);
      color: var(--gray-700);
      border: 1.5px solid var(--gray-300);
    }
    .btn-secondary:hover { background: var(--gray-50); }
    .btn-danger {
      background: var(--white);
      color: var(--red-700);
      border: 1.5px solid var(--red-500);
    }
    .btn-danger:hover { background: var(--red-100); }
    .btn-icon {
      padding: 7px;
      background: transparent;
      border: none;
      cursor: pointer;
      border-radius: var(--radius-sm);
      color: var(--gray-400);
      transition: all .15s;
      display: inline-flex; align-items: center;
    }
    .btn-icon:hover { color: var(--red-700); background: var(--red-100); }
    .btn-icon.edit:hover { color: var(--primary-text); background: var(--primary-light); }
    .btn-lg { padding: 12px 24px; font-size: 14px; width: 100%; justify-content: center; }

    /* ── Alert / Toast ───────────────────────────────────────── */
    .alert {
      padding: 12px 16px;
      border-radius: var(--radius-sm);
      font-size: 13px;
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 16px;
    }
    .alert-success { background: var(--green-100); color: var(--green-700); border: 1px solid #A7F3D0; }
    .alert-error   { background: var(--red-100);   color: var(--red-700);   border: 1px solid #FECACA; }

    /* ── Beneficiaries list ──────────────────────────────────── */
    .bene-list  { display: flex; flex-direction: column; gap: 10px; }
    .bene-item  {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border: 1.5px solid var(--gray-200);
      border-radius: var(--radius-sm);
      background: var(--gray-50);
      transition: border-color .15s;
    }
    .bene-item:hover { border-color: var(--primary); }
    .bene-info  { flex: 1; }
    .bene-name  { font-weight: 700; font-size: 14px; color: var(--gray-900); }
    .bene-sub   { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .bene-actions { display: flex; gap: 4px; }

    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
    }
    .badge-ahorro   { background: var(--blue-100); color: var(--blue-700); }
    .badge-corriente{ background: var(--primary-light); color: var(--primary-text); }
    .badge-nomina   { background: var(--green-100); color: var(--green-700); }

    /* ── Output box ──────────────────────────────────────────── */
    .output-box {
      background: var(--gray-900);
      color: #E5E7EB;
      border-radius: var(--radius-sm);
      padding: 20px;
      font-family: 'Segoe UI', monospace;
      font-size: 14px;
      line-height: 1.8;
      white-space: pre-wrap;
      word-break: break-word;
      margin-bottom: 12px;
      min-height: 180px;
    }

    .copy-row {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
    }

    /* ── Empty state ─────────────────────────────────────────── */
    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--gray-400);
    }
    .empty-icon { font-size: 32px; margin-bottom: 8px; }
    .empty-text { font-size: 13px; }

    /* ── Modal ───────────────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      width: 100%;
      max-width: 480px;
      padding: 24px;
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .modal-title { font-size: 15px; font-weight: 700; }
    .modal-close {
      background: none; border: none; cursor: pointer;
      font-size: 20px; color: var(--gray-400);
      line-height: 1;
    }
    .modal-close:hover { color: var(--gray-700); }
    .modal-footer { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }

    /* ── Tab panels ──────────────────────────────────────────── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── Divider ─────────────────────────────────────────────── */
    .divider { border: none; border-top: 1px solid var(--gray-100); margin: 20px 0; }

    /* ── Responsive ──────────────────────────────────────────── */
    @media (max-width: 600px) {
      .form-row.cols-2, .form-row.cols-3 { grid-template-columns: 1fr; }
      .topbar-tabs .tab-btn { padding: 6px 10px; font-size: 12px; }
    }

    /* ── Copied flash ────────────────────────────────────────── */
    .copied-flash {
      position: fixed;
      bottom: 24px; left: 50%; transform: translateX(-50%);
      background: var(--gray-900); color: white;
      padding: 10px 20px; border-radius: 999px;
      font-size: 13px; font-weight: 600;
      box-shadow: var(--shadow-lg);
      opacity: 0; transition: opacity .2s;
      pointer-events: none;
      z-index: 999;
    }
    .copied-flash.show { opacity: 1; }
  </style>
</head>
<body>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-icon">💳</div>
  <div>
    <div class="topbar-title">Órdenes de Pago</div>
    <div class="topbar-sub">Control de Gastos · Proyectos</div>
  </div>
  <div class="topbar-tabs">
    <button class="tab-btn active" onclick="switchTab('orden')">📄 Generar Orden</button>
    <button class="tab-btn" onclick="switchTab('beneficiarios')">👥 Beneficiarios</button>
  </div>
</div>

<!-- Flash toast -->
<div class="copied-flash" id="toast"></div>

<!-- ── PANEL: GENERAR ORDEN ──────────────────────────────────── -->
<div class="panel active" id="panel-orden">
  <div class="container">

    <!-- Datos de la orden -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span class="section-num">1</span>
          Datos de la orden
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label>Empresa pagadora *</label>
          <input type="text" id="o-empresa" placeholder="Ej: SERVINGMI SRL" />
        </div>
        <div class="form-group">
          <label>Proyecto <span class="optional">(opcional)</span></label>
          <input type="text" id="o-proyecto" placeholder="Ej: Proyecto Norte" />
        </div>
      </div>

      <div class="form-row cols-2">
        <div class="form-group">
          <label>Monto *</label>
          <input type="number" id="o-monto" placeholder="0.00" min="0" step="0.01" />
        </div>
        <div class="form-group">
          <label>Moneda *</label>
          <select id="o-moneda">
            <option value="RD$">RD$ — Pesos Dominicanos</option>
            <option value="US$">US$ — Dólares</option>
            <option value="€">€ — Euros</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Concepto / Descripción *</label>
        <textarea id="o-concepto" placeholder="Ej: Pago de servicios profesionales correspondiente a mayo 2026"></textarea>
      </div>
    </div>

    <!-- Beneficiario -->
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span class="section-num">2</span>
          Beneficiario
        </div>
        <button class="btn btn-secondary" onclick="switchTab('beneficiarios')">+ Nuevo beneficiario</button>
      </div>

      <div class="form-group">
        <label>Seleccionar beneficiario</label>
        <select id="o-beneficiario" onchange="autofillBeneficiario()">
          <option value="">— Elige un beneficiario registrado —</option>
        </select>
      </div>

      <div id="o-bene-fields" style="display:none">
        <hr class="divider">
        <p style="font-size:12px; color:var(--gray-400); margin-bottom:14px;">
          Datos bancarios autocompletados — editables si es necesario
        </p>

        <div class="form-row cols-2">
          <div class="form-group">
            <label>Titular / Nombre</label>
            <input type="text" id="o-nombre" placeholder="Nombre del beneficiario" />
          </div>
          <div class="form-group">
            <label>Banco</label>
            <input type="text" id="o-banco" placeholder="Banco Popular" />
          </div>
        </div>

        <div class="form-row cols-2">
          <div class="form-group">
            <label>Tipo de cuenta</label>
            <select id="o-tipo">
              <option value="Cuenta de Ahorros">Cuenta de Ahorros</option>
              <option value="Cuenta Corriente">Cuenta Corriente</option>
              <option value="Cuenta Nómina">Cuenta Nómina</option>
            </select>
          </div>
          <div class="form-group">
            <label>Número de cuenta</label>
            <input type="text" id="o-cuenta" placeholder="000-00000-0" />
          </div>
        </div>
      </div>
    </div>

    <!-- Generar -->
    <button class="btn btn-primary btn-lg" onclick="generarOrden()">
      ⚡ Generar Orden de Pago
    </button>

    <!-- Resultado -->
    <div id="resultado-section" style="display:none; margin-top:20px;">
      <div class="card">
        <div class="card-title" style="margin-bottom:16px;">
          <span class="section-num">3</span>
          Orden generada
        </div>
        <div class="output-box" id="output-text"></div>
        <div class="copy-row">
          <button class="btn btn-secondary" onclick="limpiarOrden()">🗑 Limpiar</button>
          <button class="btn btn-primary" onclick="copiarTexto()">📋 Copiar mensaje</button>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── PANEL: BENEFICIARIOS ──────────────────────────────────── -->
<div class="panel" id="panel-beneficiarios">
  <div class="container">

    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span class="section-num">👥</span>
          Beneficiarios registrados
        </div>
        <button class="btn btn-primary" onclick="openModal()">+ Agregar</button>
      </div>

      <div id="bene-list-container">
        <div class="empty">
          <div class="empty-icon">👤</div>
          <div class="empty-text">No hay beneficiarios aún.<br>Agrega el primero haciendo clic en "+ Agregar".</div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── MODAL: FORMULARIO BENEFICIARIO ────────────────────────── -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="modal-title">➕ Nuevo beneficiario</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>

    <div id="modal-alert" style="display:none"></div>

    <div class="form-row cols-2">
      <div class="form-group">
        <label>Nombre / Empresa *</label>
        <input type="text" id="b-nombre" placeholder="Juan Pérez o ABC SRL" />
      </div>
      <div class="form-group">
        <label>Banco *</label>
        <input type="text" id="b-banco" placeholder="Banco Popular" />
      </div>
    </div>

    <div class="form-row cols-2">
      <div class="form-group">
        <label>Tipo de cuenta *</label>
        <select id="b-tipo">
          <option value="Cuenta de Ahorros">Ahorros</option>
          <option value="Cuenta Corriente">Corriente</option>
          <option value="Cuenta Nómina">Nómina</option>
        </select>
      </div>
      <div class="form-group">
        <label>Número de cuenta *</label>
        <input type="text" id="b-cuenta" placeholder="000-00000-0" />
      </div>
    </div>

    <div class="form-row cols-2">
      <div class="form-group">
        <label>Cédula / RNC <span class="optional">(opcional)</span></label>
        <input type="text" id="b-cedula" placeholder="001-0000000-0" />
      </div>
      <div class="form-group">
        <label>Teléfono <span class="optional">(opcional)</span></label>
        <input type="text" id="b-telefono" placeholder="809-000-0000" />
      </div>
    </div>

    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal()">Cancelar</button>
      <button class="btn btn-primary" onclick="guardarBeneficiario()">
        <span id="modal-btn-text">💾 Guardar</span>
      </button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────
const STORAGE_KEY = 'ordenPago_beneficiarios';
let editingId = null;

function getBeneficiarios() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
  catch { return []; }
}
function saveBeneficiarios(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

// ── Tabs ──────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.getAttribute('onclick').includes("'" + tab + "'")) b.classList.add('active');
  });
  if (tab === 'beneficiarios') renderBeneList();
  if (tab === 'orden')         renderBeneSelect();
}

// ── Render beneficiary list ───────────────────────────────────
function badgeClass(tipo) {
  if (tipo === 'Cuenta de Ahorros') return 'badge-ahorro';
  if (tipo === 'Cuenta Corriente')  return 'badge-corriente';
  return 'badge-nomina';
}
function badgeLabel(tipo) {
  if (tipo === 'Cuenta de Ahorros') return 'Ahorros';
  if (tipo === 'Cuenta Corriente')  return 'Corriente';
  return 'Nómina';
}

function renderBeneList() {
  const list = getBeneficiarios();
  const container = document.getElementById('bene-list-container');

  if (list.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <div class="empty-icon">👤</div>
        <div class="empty-text">No hay beneficiarios aún.<br>Agrega el primero haciendo clic en "+ Agregar".</div>
      </div>`;
    return;
  }

  container.innerHTML = `<div class="bene-list">${list.map(b => `
    <div class="bene-item">
      <div class="bene-info">
        <div class="bene-name">
          ${escHtml(b.nombre)}
          <span class="badge ${badgeClass(b.tipo)}">${badgeLabel(b.tipo)}</span>
        </div>
        <div class="bene-sub">
          🏦 ${escHtml(b.banco)} &nbsp;·&nbsp; ****${escHtml(b.cuenta.slice(-4))}
          ${b.cedula ? ` &nbsp;·&nbsp; ${escHtml(b.cedula)}` : ''}
          ${b.telefono ? ` &nbsp;·&nbsp; 📞 ${escHtml(b.telefono)}` : ''}
        </div>
      </div>
      <div class="bene-actions">
        <button class="btn-icon edit" title="Editar" onclick="editarBeneficiario('${b.id}')">✏️</button>
        <button class="btn-icon" title="Eliminar" onclick="eliminarBeneficiario('${b.id}')">🗑</button>
      </div>
    </div>
  `).join('')}</div>`;
}

// ── Render select in orden panel ──────────────────────────────
function renderBeneSelect() {
  const list = getBeneficiarios();
  const sel  = document.getElementById('o-beneficiario');
  const prev = sel.value;
  sel.innerHTML = '<option value="">— Elige un beneficiario registrado —</option>';
  list.forEach(b => {
    const opt = document.createElement('option');
    opt.value = b.id;
    opt.textContent = `${b.nombre} · ${b.banco} ****${b.cuenta.slice(-4)}`;
    sel.appendChild(opt);
  });
  if (prev) { sel.value = prev; autofillBeneficiario(); }
}

// ── Autofill ──────────────────────────────────────────────────
function autofillBeneficiario() {
  const id   = document.getElementById('o-beneficiario').value;
  const list = getBeneficiarios();
  const b    = list.find(x => x.id === id);
  const fields = document.getElementById('o-bene-fields');

  if (!b) { fields.style.display = 'none'; return; }
  fields.style.display = 'block';

  document.getElementById('o-nombre').value = b.nombre;
  document.getElementById('o-banco').value   = b.banco;
  document.getElementById('o-tipo').value    = b.tipo;
  document.getElementById('o-cuenta').value  = b.cuenta;
}

// ── Modal ─────────────────────────────────────────────────────
function openModal(id = null) {
  editingId = id;
  clearModalAlert();
  document.getElementById('modal-overlay').classList.add('open');

  if (id) {
    const b = getBeneficiarios().find(x => x.id === id);
    document.getElementById('modal-title').textContent   = '✏️ Editar beneficiario';
    document.getElementById('modal-btn-text').textContent = '💾 Guardar cambios';
    document.getElementById('b-nombre').value   = b.nombre;
    document.getElementById('b-banco').value    = b.banco;
    document.getElementById('b-tipo').value     = b.tipo;
    document.getElementById('b-cuenta').value   = b.cuenta;
    document.getElementById('b-cedula').value   = b.cedula || '';
    document.getElementById('b-telefono').value = b.telefono || '';
  } else {
    document.getElementById('modal-title').textContent   = '➕ Nuevo beneficiario';
    document.getElementById('modal-btn-text').textContent = '💾 Guardar';
    ['b-nombre','b-banco','b-cuenta','b-cedula','b-telefono'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('b-tipo').value = 'Cuenta de Ahorros';
  }
}
function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  editingId = null;
}
function closeModalOutside(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function showModalAlert(msg, isError = true) {
  const el = document.getElementById('modal-alert');
  el.style.display = 'block';
  el.className = 'alert ' + (isError ? 'alert-error' : 'alert-success');
  el.textContent = msg;
}
function clearModalAlert() {
  document.getElementById('modal-alert').style.display = 'none';
}

// ── CRUD ──────────────────────────────────────────────────────
function guardarBeneficiario() {
  const nombre   = document.getElementById('b-nombre').value.trim();
  const banco    = document.getElementById('b-banco').value.trim();
  const tipo     = document.getElementById('b-tipo').value;
  const cuenta   = document.getElementById('b-cuenta').value.trim();
  const cedula   = document.getElementById('b-cedula').value.trim();
  const telefono = document.getElementById('b-telefono').value.trim();

  if (!nombre)  return showModalAlert('El nombre es requerido.');
  if (!banco)   return showModalAlert('El banco es requerido.');
  if (!cuenta)  return showModalAlert('El número de cuenta es requerido.');

  const list = getBeneficiarios();

  if (editingId) {
    const idx = list.findIndex(x => x.id === editingId);
    if (idx > -1) list[idx] = { ...list[idx], nombre, banco, tipo, cuenta, cedula, telefono };
  } else {
    list.push({ id: Date.now().toString(), nombre, banco, tipo, cuenta, cedula, telefono });
  }

  saveBeneficiarios(list);
  closeModal();
  renderBeneList();
  renderBeneSelect();
  showToast(editingId ? '✅ Beneficiario actualizado' : '✅ Beneficiario guardado');
}

function editarBeneficiario(id) { openModal(id); }

function eliminarBeneficiario(id) {
  const b = getBeneficiarios().find(x => x.id === id);
  if (!confirm(`¿Eliminar a "${b?.nombre}"? Esta acción no se puede deshacer.`)) return;
  saveBeneficiarios(getBeneficiarios().filter(x => x.id !== id));
  renderBeneList();
  renderBeneSelect();
  showToast('🗑 Beneficiario eliminado');
}

// ── Generar orden ─────────────────────────────────────────────
function formatMonto(val) {
  const n = parseFloat(val);
  if (isNaN(n)) return val;
  return n.toLocaleString('es-DO', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function generarOrden() {
  const empresa   = document.getElementById('o-empresa').value.trim();
  const proyecto  = document.getElementById('o-proyecto').value.trim();
  const monto     = document.getElementById('o-monto').value.trim();
  const moneda    = document.getElementById('o-moneda').value;
  const concepto  = document.getElementById('o-concepto').value.trim();
  const nombre    = document.getElementById('o-nombre').value.trim();
  const banco     = document.getElementById('o-banco').value.trim();
  const tipo      = document.getElementById('o-tipo').value;
  const cuenta    = document.getElementById('o-cuenta').value.trim();

  if (!empresa)  return showToast('⚠️ Ingresa la empresa pagadora', true);
  if (!monto)    return showToast('⚠️ Ingresa el monto', true);
  if (!concepto) return showToast('⚠️ Ingresa el concepto', true);
  if (!nombre)   return showToast('⚠️ Selecciona o ingresa un beneficiario', true);
  if (!banco)    return showToast('⚠️ Ingresa el banco', true);
  if (!cuenta)   return showToast('⚠️ Ingresa el número de cuenta', true);

  const hoy = new Date();
  const fecha = hoy.toLocaleDateString('es-DO', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });
  const fechaCap = fecha.charAt(0).toUpperCase() + fecha.slice(1);

  const texto = [
    empresa,
    `💰 ${moneda} ${formatMonto(monto)}`,
    `📌 Concepto: ${concepto}`,
    proyecto ? `📍 Proyecto: ${proyecto}` : null,
    `Banco: ${banco}`,
    `${tipo}: ${cuenta}`,
    `nombre: ${nombre}`,
    `📅 Fecha: ${fechaCap}`,
  ].filter(Boolean).join('\n');

  document.getElementById('output-text').textContent = texto;
  document.getElementById('resultado-section').style.display = 'block';
  document.getElementById('resultado-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copiarTexto() {
  const texto = document.getElementById('output-text').textContent;
  navigator.clipboard.writeText(texto).then(() => showToast('📋 Copiado al portapapeles'));
}

function limpiarOrden() {
  document.getElementById('resultado-section').style.display = 'none';
  document.getElementById('output-text').textContent = '';
}

// ── Toast ─────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, isWarn = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = isWarn ? '#7C2D12' : '#111827';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ── Utils ─────────────────────────────────────────────────────
function escHtml(str = '') {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────
renderBeneSelect();
</script>
